name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test tests/

      - name: Typecheck
        # Invoke the compiler entrypoint directly: `npx tsc` is unreliable
        # here — "tsc" is a squatted npm package name, and npx on a
        # bun-installed node_modules failed to resolve the local binary on
        # the windows-latest runner, then tried to fetch the decoy package.
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: Build
        run: bun run build
